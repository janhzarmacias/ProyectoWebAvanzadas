<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad - Asociación FIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        .chat-box {
            height: 60vh;
            overflow-y: auto;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 15px;
            /* Modificación 1: Flexbox para manejar las alineaciones */
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 15px;
            background-color: #e9ecef; /* Gris por defecto */
            width: fit-content;
            max-width: 80%;
            /* Por defecto, todos los mensajes se alinean a la izquierda */
            align-self: flex-start;
        }

        /* Modificación 2: Nueva clase para los mensajes propios */
        .message.own-message {
            background-color: #dcf8c6; /* Verde estilo chat clásico */
            align-self: flex-end; /* Alineación a la derecha */
            border-bottom-right-radius: 2px; /* Pequeño detalle visual en la esquina */
        }

        /* Opcional: Cambiar el color del nombre en los mensajes propios para que contraste mejor */
        .message.own-message .message-sender {
            color: #198754;
        }

        .message-sender {
            font-weight: bold;
            font-size: 0.85rem;
            color: #0d6efd;
            margin-bottom: 5px;
        }
        .message-time {
            font-size: 0.75rem;
            color: #6c757d;
            margin-top: 5px;
            text-align: right;
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="text-primary">Sala de Chat <span class="badge bg-secondary fs-6" id="connectionStatus">Conectando...</span></h2>
        <a href="/catalogo" class="btn btn-outline-secondary">Volver al Catálogo</a>
    </div>

    <div class="chat-box mb-3" id="chatArea">
        <div th:each="msg : ${history}"
             class="message"
             th:classappend="${msg.sender() == #authentication.name} ? 'own-message' : ''">
            <div class="message-sender" th:text="${msg.sender()}">Usuario</div>
            <div th:text="${msg.content()}">Contenido del mensaje</div>
            <div class="message-time" th:text="${#temporals.format(msg.timestamp(), 'HH:mm')}">10:00</div>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="messageInput" class="form-control" placeholder="Escribe un mensaje a la comunidad..." autocomplete="off">
        <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const categoryId = /*[[${categoryId}]]*/ 1;

    // Modificación 4: Inyectamos el usuario actual desde Spring Security a JavaScript
    const currentUser = /*[[${#authentication.name}]]*/ 'usuario';
    /*]]>*/

    let stompClient = null;

    document.addEventListener("DOMContentLoaded", connect);

    document.getElementById("messageInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });

    function connect() {
        const socket = new SockJS('/ws-asociacion');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {
            document.getElementById('connectionStatus').innerText = 'En línea';
            document.getElementById('connectionStatus').className = 'badge bg-success fs-6';

            stompClient.subscribe('/topic/chat/' + categoryId, function (messageOutput) {
                showMessage(JSON.parse(messageOutput.body));
            });

            scrollToBottom();
        }, function(error) {
            document.getElementById('connectionStatus').innerText = 'Desconectado';
            document.getElementById('connectionStatus').className = 'badge bg-danger fs-6';
            console.error('Error de conexión WebSocket: ' + error);
        });
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const content = input.value.trim();

        if (content && stompClient) {
            const chatMessage = {
                content: content
            };

            stompClient.send("/app/chat/" + categoryId, {}, JSON.stringify(chatMessage));
            input.value = '';
        }
    }

    function showMessage(message) {
        const chatArea = document.getElementById('chatArea');

        const date = new Date(message.timestamp);
        const timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        const messageDiv = document.createElement('div');
        messageDiv.className = 'message';

        // Modificación 5: Si el mensaje entrante es nuestro, le agregamos la clase verde
        if (message.sender === currentUser) {
            messageDiv.classList.add('own-message');
        }

        messageDiv.innerHTML = `
            <div class="message-sender">${message.sender}</div>
            <div>${message.content}</div>
            <div class="message-time">${timeString}</div>
        `;

        chatArea.appendChild(messageDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        const chatArea = document.getElementById('chatArea');
        chatArea.scrollTop = chatArea.scrollHeight;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
