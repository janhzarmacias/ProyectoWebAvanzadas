<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Asociación FIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">
    <h1 class="mb-4 text-primary text-center">Juegos Disponibles - Asociación FIS</h1>

    <div sec:authorize="hasRole('ADMIN')" class="text-end mb-4">
        <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#modalCategoria">
            + Nueva Categoría
        </button>
    </div>

    <div class="modal fade" id="modalCategoria" tabindex="-1" sec:authorize="hasRole('ADMIN')">
        <div class="modal-dialog">
            <form th:action="@{/catalogo/categorias/nueva}" method="post" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Crear Categoría</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" name="name" class="form-control" placeholder="Nombre (ej. Juegos de Mesa)" required>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="category : ${categories}">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center d-flex flex-column">
                    <h4 class="card-title" th:text="${category.name()}">Nombre Categoría</h4>
                    <p class="card-text text-muted mb-4">ID de Sala: <span th:text="${category.id()}">1</span></p>

                    <div class="d-grid gap-2 mt-auto">
                        <a th:href="@{/categoria/{id}/disponibilidad(id=${category.id()})}" class="btn btn-outline-primary">Ver disponibilidad</a>

                        <a th:href="@{/categoria/{id}/chat(id=${category.id()})}" class="btn btn-success">
                            💬 Chat de Comunidad
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12" th:if="${#lists.isEmpty(categories)}">
            <div class="alert alert-warning text-center shadow-sm">
                Aún no hay categorías de juegos registradas en el sistema.
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
