<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Asociación FIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .login-bg {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .card-custom {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body class="login-bg">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card card-custom">
                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <h2 class="text-primary fw-bold">Asociación FIS</h2>
                        <p class="text-muted small">Ingresa con tu cuenta institucional</p>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger text-center small p-2" role="alert">
                        Correo o contraseña incorrectos.
                    </div>

                    <div th:if="${param.logout}" class="alert alert-info text-center small p-2" role="alert">
                        Has cerrado sesión exitosamente.
                    </div>

                    <div th:if="${param.registered}" class="alert alert-success text-center small p-2" role="alert">
                        ¡Cuenta creada! Ya puedes iniciar sesión.
                    </div>

                    <form th:action="@{/login}" method="post">

                        <div class="mb-3">
                            <label for="username" class="form-label text-secondary small fw-bold">Correo Institucional</label>
                            <input type="email" id="username" name="username" class="form-control"
                                   placeholder="ejemplo@epn.edu.ec" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label text-secondary small fw-bold">Contraseña</label>
                            <input type="password" id="password" name="password" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3">
                            Entrar al Sistema
                        </button>

                    </form>

                    <hr class="my-4 text-muted">

                    <div class="text-center">
                        <p class="small text-muted mb-0">¿Eres estudiante y nuevo aquí?</p>
                        <a href="/registro" class="text-decoration-none fw-bold">Crea tu cuenta de acceso</a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
