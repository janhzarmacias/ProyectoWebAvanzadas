server:
  port: 8080

spring:
  profiles:
    active: dev
  # 1. Configuraciï¿½n de conexiï¿½n a PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/renta_juegos_db
    username: postgres
    password: montero
    driver-class-name: org.postgresql.Driver

  # 2. Configuraciï¿½n de JPA e Hibernate (La magia automï¿½tica)
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # 'update' actualiza el esquema si hay cambios.
      # 'create-drop' borra y crea todo de cero al reiniciar (ï¿½til al inicio, pero peligroso luego)
      ddl-auto: update

    # 3. Herramientas de desarrollo
    # Muestra en la consola el SQL que Spring genera por detrï¿½s
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # 4. Configuraciï¿½n de Thymeleaf (para evitar problemas en desarrollo)
  thymeleaf:
    cache: false # Apaga el cachï¿½ para que veas los cambios en el HTML al recargar la pï¿½gina
    mode: HTML
